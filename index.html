    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Почему потеют пластиковые окна?","acceptedAnswer":{"@type":"Answer","text":"Причина кроется в герметичности конструкции. Если окна закрыты и давно не проветривались, с внутренней стороны стекла начнёт появляться конденсат. Рекомендуется регулярно проветривать помещение."}},{"@type":"Question","name":"Безопасны ли пластиковые окна?","acceptedAnswer":{"@type":"Answer","text":"Да, они содержат экологически чистые и безопасные компоненты."}},{"@type":"Question","name":"В чём отличия профилей окон ПВХ?","acceptedAnswer":{"@type":"Answer","text":"Оконные профили ПВХ отличаются следующими параметрами: качеством пластика; числом воздушных камер (3, 4, 5); технологией и толщиной армирования (1,5/2 мм); монтажной шириной (58, 70, 76 мм); цветом и дизайнерским решением (прямоугольные, арочные, трапециевидные окна; окна с односторонней или двухсторонней ламинацией; декоративные вставки в стеклопакет, тонировка стеклопакетов)."}},{"@type":"Question","name":"На что влияет количество камер в профиле ПВХ?","acceptedAnswer":{"@type":"Answer","text":"Их число определяет, насколько хорошо профиль удерживает тепло. Для стран, где большую часть года царит прохладная погода, подходит пятикамерный профиль (70 мм). Он надёжно защищает помещение от проникновения холода."}},{"@type":"Question","name":"Как выбрать стеклопакет?","acceptedAnswer":{"@type":"Answer","text":"Стеклопакет — это конструкция из двух и более стёкол, скреплённых дистанционными рамками и герметиками. Пространство между стёклами (камера) заполняют осушенным воздухом или аргоном для шумо- и теплоизоляции. Двухкамерный стеклопакет (три стекла, две камеры) подходит для отапливаемых жилых помещений и хорошо переносит морозы — конденсат начинает образовываться при температуре ниже −20°C. Однокамерный стеклопакет содержит два стекла и одну камеру."}},{"@type":"Question","name":"Ваша специализация — исключительно пластиковые окна?","acceptedAnswer":{"@type":"Answer","text":"Нет, мы готовы предложить своим клиентам широкий спектр услуг. Мы устанавливаем пластиковые окна и балконные двери, предлагаем зонирование пространства с помощью межкомнатных перегородок. Также мы выполняем работы по утеплению и отделке балконов. В качестве дополнения вы можете выбрать стильные откосы, ламинацию оконного профиля, необычный подоконник — эти детали помогут органично вписать окна в любой интерьер."}},{"@type":"Question","name":"Есть ли гарантия?","acceptedAnswer":{"@type":"Answer","text":"Да, мы предоставляем гарантию 10 лет на профиль, 5 лет на монтажные работы и фурнитуру."}},{"@type":"Question","name":"Вы работаете за пределами Червеня?","acceptedAnswer":{"@type":"Answer","text":"Да, мы выполняем заказы по всей Минской области и за её пределами. Выезд замерщика бесплатный."}}]}</script>
